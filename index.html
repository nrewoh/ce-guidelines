  <meta name="description" content="Description">

  <link rel="stylesheet" href="//cdn.jsdelivr.net/npm/docsify@4/lib/themes/vue.css">

  <style>
    /* Force the content section to take up 100% width of the screen */
    .markdown-section {
      max-width: 100% !important;
      padding: 10px 20px 0px 20px !important;
    }
    /* Ensure the app container doesn't limit height */
    main, .content {
      height: 100vh;
    }
    /* Give the iframe a clean, responsive breathing room */
    iframe {
      width: 100%;
      height: calc(100vh - 45px);
      border: 1px solid #eee;
      border-radius: 4px;
    }
  </style>
</head>

  <script>

      name: 'Clinical Guidelines',
      repo: '',
      loadSidebar: true,
      subMaxLevel: 2
    }
  </script>
